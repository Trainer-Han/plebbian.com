<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Plebbian - Something extraordinary is coming. Join our community on Discord and GitHub.">
    <meta name="keywords" content="Plebbian, community, coming soon">
    <meta name="author" content="Plebbian">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Plebbian">
    <meta property="og:description" content="Something extraordinary is coming. Join our community.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://plebbian.com">
    <meta property="og:image" content="https://plebbian.com/og-image.png">
    <meta property="og:site_name" content="Plebbian">
    
    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Plebbian">
    <meta name="twitter:description" content="Something extraordinary is coming. Join our community.">
    <meta name="twitter:image" content="https://plebbian.com/og-image.png">
    
    <title>Plebbian - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #0f172a 100%);
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        .bg-element {
            position: fixed;
            border-radius: 50%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }

        .bg-element-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            top: -150px;
            left: -150px;
            animation: float 20s ease-in-out infinite;
        }

        .bg-element-2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #ec4899, #f59e0b);
            bottom: -125px;
            right: -125px;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
            }
            25% {
                transform: translateY(-30px) translateX(20px);
            }
            50% {
                transform: translateY(-60px) translateX(-20px);
            }
            75% {
                transform: translateY(-30px) translateX(20px);
            }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 600px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo/Brand */
        .brand {
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-text {
            font-size: 64px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            margin-bottom: 10px;
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.5));
            }
        }

        .tagline {
            font-size: 14px;
            color: #94a3b8;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 50px;
            animation: slideUp 1s ease-out 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            line-height: 1.2;
            color: #f1f5f9;
        }

        .hero p {
            font-size: 18px;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* CTA Buttons */
        .cta-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 1s ease-out 0.4s both;
        }

        .btn {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border: 2px solid;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border-color: transparent;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: #e2e8f0;
            border-color: #475569;
        }

        .btn-secondary:hover {
            border-color: #64748b;
            background: rgba(100, 116, 139, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(100, 116, 139, 0.2);
        }

        .btn-secondary:active {
            transform: translateY(-1px);
        }

        /* Icon emoji */
        .icon {
            font-size: 20px;
        }

        /* Footer */
        .footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
            font-size: 14px;
            color: #64748b;
            animation: slideUp 1s ease-out 0.6s both;
        }

        .footer p {
            margin-bottom: 10px;
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .logo-text {
                font-size: 48px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero p {
                font-size: 16px;
            }

            .cta-buttons {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }

            .bg-element-1 {
                width: 200px;
                height: 200px;
                top: -100px;
                left: -100px;
            }

            .bg-element-2 {
                width: 180px;
                height: 180px;
                bottom: -90px;
                right: -90px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .logo-text {
                font-size: 40px;
            }

            .hero h1 {
                font-size: 28px;
            }

            .hero p {
                font-size: 15px;
            }

            .btn {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background elements -->
    <div class="bg-element bg-element-1"></div>
    <div class="bg-element bg-element-2"></div>

    <!-- Main Content -->
    <div class="container">
        <!-- Brand -->
        <div class="brand">
            <div class="logo-text">Plebbian</div>
            <div class="tagline">Something Extraordinary</div>
        </div>

        <!-- Hero Section -->
        <div class="hero">
            <h1>Coming Soon</h1>
            <p>We're building something special. Join our community and stay updated as we launch.</p>
        </div>

        <!-- CTA Buttons -->
        <div class="cta-buttons">
            <a href="https://discord.gg/plebbian" class="btn btn-primary" target="_blank" rel="noopener noreferrer">
                <span class="icon">💬</span>
                Join Discord
            </a>
            <a href="https://github.com/Trainer-Han/plebbian" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">
                <span class="icon">🔗</span>
                GitHub
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2026 Plebbian. All rights reserved.</p>
            <p>Made with ❤️</p>
        </div>
    </div>

    <script>
        // Add subtle interaction effects
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-3px) scale(1.02)';
            });
            button.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });

        // Smooth scroll for any anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
